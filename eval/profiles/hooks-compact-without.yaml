# DTU Profile: Amplifier environment WITHOUT hooks-compact (baseline)
#
# Used for the "B" side of A/B testing.
# Identical to hooks-compact-with.yaml except NO hooks-compact in bundle.app.
#
# Variables (pass at launch via --var):
#   ANTHROPIC_API_KEY -- forwarded to the Amplifier provider inside the container
name: hooks-compact-without
description: >
  Baseline Amplifier CLI environment with no hooks-compact.
  Used for B-side of A/B testing — raw uncompressed tool output.
base:
  image: ubuntu:24.04

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

provision:
  setup_cmds:
    # System deps
    - apt-get update && apt-get install -y git curl python3 python3-pip cargo nodejs npm

    # Install uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh

    # Install Amplifier (no hooks-compact)
    - |
      export PATH="/root/.local/bin:$PATH"
      uv tool install git+https://github.com/microsoft/amplifier

    # Configure Amplifier provider — no hooks in bundle.app
    - |
      mkdir -p /root/.amplifier
      cat > /root/.amplifier/settings.yaml << 'YAMLEOF'
      config:
        providers:
          - module: provider-anthropic
            source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
            config:
              api_key: $ANTHROPIC_API_KEY
      YAMLEOF

    # Clone hooks-compact repo for use in test scenarios
    - git clone https://github.com/samueljklee/amplifier-module-hooks-compact /root/hooks-compact
    - cd /root/hooks-compact && pip install uv && uv sync

    # Create test fixtures (identical to WITH container so tests are comparable)
    - |
      cat > /tmp/test_eval_fail.py << 'PYEOF'
      def test_addition_passes():
          assert 1 + 1 == 2

      def test_string_passes():
          assert "hello".upper() == "HELLO"

      def test_multiplication_fails():
          result = 6 * 7
          assert result == 99, f"Expected 99 but got {result}"

      def test_division_fails():
          result = 10 / 2
          assert result == 7, f"Expected 7 but got {result}"

      def test_boolean_fails():
          items = [1, 2, 3]
          assert len(items) == 10, f"Expected 10 items but got {len(items)}"
      PYEOF

    - |
      cat > /tmp/lint_issues.py << 'PYEOF'
      import os
      import sys
      import json
      import pathlib

      x = 1
      y = 2
      unused_var = "never read"

      def calculate(a, b):
          result = a + b
          unused_result = a * b
          return result

      if x == True:
          print("x is true")

      if y == False:
          print("y is false")
      PYEOF

    - |
      mkdir -p /tmp/test-rust-project/src
      cat > /tmp/test-rust-project/Cargo.toml << 'TOML'
      [package]
      name = "test-project"
      version = "0.1.0"
      edition = "2021"
      TOML
      cat > /tmp/test-rust-project/src/lib.rs << 'RUST'
      pub fn add(a: i32, b: i32) -> i32 { a + b }
      pub fn multiply(a: i32, b: i32) -> i32 { a * b }
      #[cfg(test)]
      mod tests {
          use super::*;
          #[test] fn test_add() { assert_eq!(add(2, 3), 5); }
          #[test] fn test_multiply() { assert_eq!(multiply(3, 4), 12); }
          #[test] fn test_add_negative() { assert_eq!(add(-1, 1), 0); }
          #[test] fn test_large_numbers() { assert_eq!(add(100, 200), 300); }
      }
      RUST

    - |
      mkdir -p /tmp/test-node-project
      cat > /tmp/test-node-project/package.json << 'JSON'
      {"name":"test-node-project","version":"1.0.0","scripts":{"test":"mocha test.js","build":"echo 'Build complete. Bundle: dist/app.js (42KB)'"},"devDependencies":{"mocha":"^10.0.0"}}
      JSON
      cat > /tmp/test-node-project/test.js << 'JS'
      const assert = require('assert');
      describe('Math operations', function() {
        it('should add', function() { assert.equal(2+3, 5); });
        it('should multiply', function() { assert.equal(4*5, 20); });
        it('should concat', function() { assert.equal('a'+'b', 'ab'); });
        it('should check length', function() { assert.equal([1,2,3].length, 3); });
      });
      JS
      cd /tmp/test-node-project && npm install

    - |
      mkdir -p /tmp/test-make-project
      cat > /tmp/test-make-project/Makefile << 'MAKE'
      .PHONY: all build test clean
      all: build test
      build:
      	@echo "Compiling..." && echo "Build complete: bin/app"
      test:
      	@echo "All 2 tests passed."
      clean:
      	@echo "Clean complete."
      MAKE
