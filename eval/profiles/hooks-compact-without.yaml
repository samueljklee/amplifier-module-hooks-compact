# DTU Profile: Amplifier environment WITHOUT hooks-compact (baseline)
#
# Used for the "B" side of A/B testing the hooks-compact module.
# Identical to hooks-compact-with.yaml except bundle.app does NOT include
# the hooks-compact behavior, so Amplifier sees raw uncompressed tool output.
#
# Variables (pass at launch via --var):
#   ANTHROPIC_API_KEY -- forwarded to the Amplifier provider inside the container
#
# Sample projects created at launch (identical to the "with" profile):
#   /workspace/test-python  -- ruff lint issues + pytest failures
#   /workspace/test-rust    -- cargo test/build/clippy targets
#   /workspace/test-node    -- npm test (mocha) + tsc errors + eslint issues
#   /workspace              -- git initialized with dirty working tree
name: hooks-compact-without
description: >
  Baseline Amplifier CLI environment with NO hooks-compact behavior.
  Used for the B-side of A/B testing the hooks-compact module. Identical
  environment and test fixtures to hooks-compact-with, just no compression.

base:
  image: ubuntu:24.04

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

provision:
  setup_cmds:
    # --- System packages ---------------------------------------------------
    - |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends \
        ca-certificates curl git build-essential \
        python3 python3-pip python3-venv \
        rustc cargo rust-clippy \
        nodejs npm \
        jq

    # --- uv (needed to install Amplifier + Python tools) -----------------
    - curl -LsSf https://astral.sh/uv/install.sh | sh

    # --- Install Amplifier CLI --------------------------------------------
    - |
      export PATH="/root/.local/bin:$PATH"
      uv tool install git+https://github.com/microsoft/amplifier

    # --- Install Python dev tools used by the test scenarios --------------
    - |
      export PATH="/root/.local/bin:$PATH"
      uv tool install ruff
      uv tool install pytest

    # --- Node dev tools used by the test scenarios ------------------------
    - npm install -g --silent eslint typescript mocha

    # --- Amplifier configuration: provider only, NO hooks-compact ---------
    - |
      mkdir -p /root/.amplifier
      cat > /root/.amplifier/settings.yaml << YAMLEOF
      config:
        providers:
          - module: provider-anthropic
            source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
            config:
              api_key: $ANTHROPIC_API_KEY
      YAMLEOF

    # --- Workspace scaffolding --------------------------------------------
    - mkdir -p /workspace

    # /workspace/test-python -----------------------------------------------
    - |
      mkdir -p /workspace/test-python/src /workspace/test-python/tests
      cat > /workspace/test-python/pyproject.toml << 'TOML'
      [project]
      name = "test-python"
      version = "0.1.0"
      requires-python = ">=3.10"
      TOML
      cat > /workspace/test-python/src/main.py << 'PY'
      import os
      import sys
      import json
      import pathlib

      x = 1
      y = 2
      unused_var = "never read"


      def calculate(a, b):
          result = a + b
          unused_result = a * b
          return result


      if x == True:
          print("x is true")

      if y == False:
          print("y is false")

      try:
          risky = 1 / 0
      except:
          pass
      PY
      cat > /workspace/test-python/tests/test_calc.py << 'PY'
      def test_addition_passes():
          assert 1 + 1 == 2


      def test_string_passes():
          assert "hello".upper() == "HELLO"


      def test_multiplication_fails():
          result = 6 * 7
          assert result == 99, f"Expected 99 but got {result}"


      def test_division_fails():
          result = 10 / 2
          assert result == 7, f"Expected 7 but got {result}"


      def test_length_fails():
          items = [1, 2, 3]
          assert len(items) == 10, f"Expected 10 items but got {len(items)}"
      PY

    # /workspace/test-rust -------------------------------------------------
    - |
      mkdir -p /workspace/test-rust/src
      cat > /workspace/test-rust/Cargo.toml << 'TOML'
      [package]
      name = "test-rust"
      version = "0.1.0"
      edition = "2021"

      [lib]
      path = "src/lib.rs"
      TOML
      cat > /workspace/test-rust/src/lib.rs << 'RUST'
      pub fn add(a: i32, b: i32) -> i32 {
          a + b
      }

      pub fn multiply(a: i32, b: i32) -> i32 {
          a * b
      }

      // Intentional clippy warnings
      pub fn redundant_return(x: i32) -> i32 {
          let y = x;
          return y;
      }

      pub fn unused_parameter(x: i32, _unused: i32) -> i32 {
          let z = x;
          z + 1
      }

      #[cfg(test)]
      mod tests {
          use super::*;

          #[test]
          fn test_add() {
              assert_eq!(add(2, 3), 5);
          }

          #[test]
          fn test_multiply() {
              assert_eq!(multiply(3, 4), 12);
          }

          #[test]
          fn test_add_negative() {
              assert_eq!(add(-1, 1), 0);
          }

          #[test]
          fn test_large_numbers() {
              assert_eq!(add(100, 200), 300);
          }
      }
      RUST
      cd /workspace/test-rust && cargo build --quiet 2>&1 | tail -5 || true

    # /workspace/test-node -------------------------------------------------
    - |
      mkdir -p /workspace/test-node/src
      cat > /workspace/test-node/package.json << 'JSON'
      {
        "name": "test-node",
        "version": "1.0.0",
        "scripts": {
          "test": "mocha test.js",
          "build": "tsc",
          "lint": "eslint src/"
        },
        "devDependencies": {
          "mocha": "^10.0.0"
        }
      }
      JSON
      cat > /workspace/test-node/test.js << 'JS'
      const assert = require('assert');

      describe('Math operations', function () {
        it('adds two numbers', function () {
          assert.equal(2 + 3, 5);
        });

        it('multiplies two numbers', function () {
          assert.equal(4 * 5, 20);
        });

        it('concatenates strings', function () {
          assert.equal('hello' + ' world', 'hello world');
        });

        it('measures array length', function () {
          assert.equal([1, 2, 3].length, 3);
        });
      });
      JS
      cat > /workspace/test-node/tsconfig.json << 'TSC'
      {
        "compilerOptions": {
          "target": "es2020",
          "module": "commonjs",
          "strict": true,
          "outDir": "dist",
          "noEmit": true
        },
        "include": ["src/**/*.ts"]
      }
      TSC
      cat > /workspace/test-node/src/app.ts << 'TS'
      // Intentional tsc type errors
      const greeting: string = 42;

      interface User {
        name: string;
        age: number;
      }

      const users: User[] = [{ name: 'alice' }, { name: 'bob' }];
      users.forEach((u) => console.log(u.age.toFixed(2)));

      function double(n: number): number {
        return n + "x";
      }
      TS
      cat > /workspace/test-node/.eslintrc.json << 'ESLINT'
      {
        "root": true,
        "env": { "node": true, "es2020": true },
        "parserOptions": { "ecmaVersion": 2020, "sourceType": "script" },
        "rules": {
          "no-unused-vars": "error",
          "semi": ["error", "always"],
          "eqeqeq": "error"
        }
      }
      ESLINT
      cat > /workspace/test-node/src/bad.js << 'JS'
      const x = 10
      const y = 20
      const unused = 'never used'
      if (x == 10) {
        console.log('equal')
      }
      console.log(x + y)
      JS
      cd /workspace/test-node && npm install --silent --no-audit --no-fund

    # --- Git init + a dirty working tree so git filters have real data ----
    - |
      cd /workspace
      git init -q -b main
      git config user.email test@example.com
      git config user.name "DTU Test"
      git add -A
      git commit -q -m "Initial test projects"
      echo "# TODO: fix lint issues" >> /workspace/test-python/src/main.py
      printf '\npub fn extra() -> i32 { 42 }\n' >> /workspace/test-rust/src/lib.rs
      echo "const newVar = 'hello';" > /workspace/test-node/src/untracked.js

    # --- PATH for every future shell --------------------------------------
    - echo 'export PATH="/root/.local/bin:$PATH"' >> /root/.bashrc
    - echo 'cd /workspace' >> /root/.bashrc

    # --- Smoke verification of installed tools ----------------------------
    - |
      export PATH="/root/.local/bin:$PATH"
      echo "=== installed tools ==="
      amplifier --version
      ruff --version
      pytest --version
      python3 --version
      cargo --version
      rustc --version
      cargo clippy --version || true
      node --version
      npm --version
      tsc --version
      eslint --version
      mocha --version

readiness:
  - name: amplifier-available
    command: "bash -lc 'export PATH=/root/.local/bin:$PATH && amplifier --version'"
  - name: no-hooks-compact
    command: "bash -lc 'export PATH=/root/.local/bin:$PATH && ! amplifier bundle list 2>/dev/null | grep -qi compact'"
  - name: workspace-ready
    command: "bash -lc 'test -d /workspace/test-python && test -d /workspace/test-rust && test -d /workspace/test-node && test -d /workspace/.git'"

update:
  cmds:
    - |
      export PATH="/root/.local/bin:$PATH"
      uv tool install --reinstall --force git+https://github.com/microsoft/amplifier
