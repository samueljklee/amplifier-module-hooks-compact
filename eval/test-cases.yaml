# hooks-compact: Comprehensive Eval Test Cases
# All 26 filter scenarios with setup/cleanup and evaluation criteria.
#
# Path variables (resolved by consuming scripts — not native YAML features):
#   $REPO_ROOT    — this repository's root directory
#   $FIXTURES_DIR — eval fixture directory (env HOOKS_COMPACT_EVAL_FIXTURES, default: ./eval/fixtures)
#
# Run eval/bootstrap.sh first to create fixture directories under $FIXTURES_DIR.
#
# Format for reporting results:
#   Simulation: | Scenario | Filter | Before (chars) | After (chars) | Savings | Before Preview | After Preview |
#   A/B Test:   | Scenario | Input | Output | Savings | With Turns | Without Turns | With Calls | Without Calls | Verdict |

test_cases:
  # ── GIT FILTERS ────────────────────────────────────────────────────────────

  - id: git-status-dirty
    name: "Git status (dirty working tree)"
    category: git
    filter: git-status
    scenario: normal
    prompt: "check git status in this repo"
    working_dir: $REPO_ROOT
    expected_commands: [git status]
    max_acceptable_tool_calls: 2
    notes: "Should show branch, staged/unstaged/untracked files compactly"

  - id: git-diff-large
    name: "Git diff (large unified diff)"
    category: git
    filter: git-diff
    scenario: normal
    prompt: "show me the diff of any uncommitted changes"
    working_dir: $REPO_ROOT
    expected_commands: [git diff]
    max_acceptable_tool_calls: 2
    notes: "Should keep diffstat + first N changed lines per file"

  - id: git-log
    name: "Git log (recent commits)"
    category: git
    filter: git-log
    scenario: normal
    prompt: "show me the last 10 commits"
    working_dir: $REPO_ROOT
    expected_commands: ["git log"]
    max_acceptable_tool_calls: 2
    notes: "Already compact in --oneline mode; minimal savings expected"

  - id: git-push-success
    name: "Git push (up to date)"
    category: git
    filter: git-simple
    scenario: success
    prompt: "push the current branch to origin"
    working_dir: $REPO_ROOT
    expected_commands: ["git push"]
    max_acceptable_tool_calls: 2
    notes: "Success should short-circuit to branch ref or 'ok'"

  - id: git-push-rejected
    name: "Git push (rejected)"
    category: git
    filter: git-simple
    scenario: failure
    prompt: "push the current branch to origin"
    working_dir: $REPO_ROOT
    expected_commands: ["git push"]
    max_acceptable_tool_calls: 2
    notes: "Failure should preserve the error and hint lines"

  - id: git-commit
    name: "Git commit"
    category: git
    filter: git-simple
    scenario: success
    prompt: "stage all changes and commit with message 'test: eval commit'"
    working_dir: $FIXTURES_DIR/test-rust-project
    expected_commands: ["git commit"]
    max_acceptable_tool_calls: 3
    notes: "Should preserve [branch hash] message line; strip everything else"

  - id: git-pull
    name: "Git pull (fast-forward)"
    category: git
    filter: git-simple
    scenario: success
    prompt: "pull the latest changes from origin"
    working_dir: $REPO_ROOT
    expected_commands: ["git pull"]
    max_acceptable_tool_calls: 2
    notes: "Should keep remote ref and file change summary"

  # ── TEST RUNNER FILTERS ────────────────────────────────────────────────────

  - id: pytest-all-pass
    name: "pytest all pass (280 tests)"
    category: test-runner
    filter: pytest
    scenario: all-pass
    prompt: "run the test suite with uv run pytest -q and tell me if all tests pass"
    working_dir: $REPO_ROOT
    expected_commands: [pytest]
    max_acceptable_tool_calls: 2
    notes: "Should collapse to '✓ N passed in Xs'. Asymmetric: ~94% savings."

  - id: pytest-failures
    name: "pytest with 3 failures"
    category: test-runner
    filter: pytest
    scenario: failures
    prompt: "run pytest on /tmp/test_eval_fail.py -v and tell me what failed"
    working_dir: $REPO_ROOT
    expected_commands: [pytest]
    max_acceptable_tool_calls: 3
    notes: "Must preserve FAILURES section + error messages. Asymmetric: ~43% savings."

  - id: cargo-test-pass
    name: "cargo test all pass"
    category: test-runner
    filter: cargo-test
    scenario: all-pass
    prompt: "run cargo test and tell me if all tests pass"
    working_dir: $FIXTURES_DIR/test-rust-project
    expected_commands: ["cargo test"]
    max_acceptable_tool_calls: 2
    notes: "Should collapse to '✓ N passed (Xs)'. ~96% savings."

  - id: cargo-test-fail
    name: "cargo test with 2 failures"
    category: test-runner
    filter: cargo-test
    scenario: failures
    prompt: "run cargo test and tell me what failed"
    working_dir: $FIXTURES_DIR/test-rust-fail
    expected_commands: ["cargo test"]
    max_acceptable_tool_calls: 3
    notes: "Must preserve thread panic output for each failure. ~39% savings."

  - id: npm-test-pass
    name: "npm test all pass (Mocha)"
    category: test-runner
    filter: npm-test
    scenario: all-pass
    prompt: "run npm test and tell me if all tests pass"
    working_dir: $FIXTURES_DIR/test-node-project
    expected_commands: ["npm test"]
    max_acceptable_tool_calls: 2
    notes: "Mocha: should collapse to '✓ N passing'. ~95% savings."

  - id: npm-test-fail
    name: "npm test with 2 failures (Mocha)"
    category: test-runner
    filter: npm-test
    scenario: failures
    prompt: "run npm test and tell me what failed"
    working_dir: $FIXTURES_DIR/test-node-fail
    expected_commands: ["npm test"]
    max_acceptable_tool_calls: 3
    notes: "Mocha: must show '✗ N failing' with AssertionError details. ~12% savings (failure case)."

  # ── LINT FILTERS ──────────────────────────────────────────────────────────

  - id: ruff-errors
    name: "ruff check with 10 violations"
    category: lint
    filter: ruff
    scenario: errors
    prompt: "run ruff check on /tmp/lint_issues.py and tell me what needs fixing"
    working_dir: $REPO_ROOT
    expected_commands: [ruff]
    max_acceptable_tool_calls: 2
    notes: "Group-by-rule compression. Must show all unique violations. ~76% savings."

  - id: ruff-clean
    name: "ruff check clean"
    category: lint
    filter: ruff
    scenario: clean
    prompt: "run ruff check on the source and tell me if there are any lint issues"
    working_dir: $REPO_ROOT
    expected_commands: [ruff]
    max_acceptable_tool_calls: 2
    notes: "Already short output; should return 'ok (no ruff issues)'. ~0% savings (correct)."

  - id: cargo-clippy
    name: "cargo clippy with warnings"
    category: lint
    filter: cargo-clippy
    scenario: warnings
    prompt: "run cargo clippy and tell me about any warnings"
    working_dir: $FIXTURES_DIR/test-rust-clippy
    expected_commands: ["cargo clippy"]
    max_acceptable_tool_calls: 2
    notes: "Group-by-rule compression. ~74% savings."

  - id: eslint-errors
    name: "eslint with 11 errors, 2 warnings"
    category: lint
    filter: eslint
    scenario: errors
    prompt: "run npx eslint src/ and tell me what needs to be fixed"
    working_dir: $FIXTURES_DIR/test-node-eslint
    expected_commands: [eslint]
    max_acceptable_tool_calls: 2
    notes: "Group-by-rule compression. ~78% savings."

  # ── BUILD FILTERS ─────────────────────────────────────────────────────────

  - id: cargo-build-clean
    name: "cargo build (success with warnings)"
    category: build
    filter: cargo-build
    scenario: success-with-warnings
    prompt: "build the project with cargo build and tell me if it succeeds"
    working_dir: $FIXTURES_DIR/test-rust-project
    expected_commands: ["cargo build"]
    max_acceptable_tool_calls: 2
    notes: "Should return 'ok (build succeeded, with warnings)' + warning blocks. ~41% savings."

  - id: cargo-build-errors
    name: "cargo build with 2 compile errors"
    category: build
    filter: cargo-build
    scenario: errors
    prompt: "build the project and tell me what errors need to be fixed"
    working_dir: $FIXTURES_DIR/test-rust-errors
    expected_commands: ["cargo build"]
    max_acceptable_tool_calls: 2
    notes: "Error-only strategy. Must preserve error[E...] blocks. ~65% savings."

  - id: tsc-errors
    name: "tsc with 2 type errors"
    category: build
    filter: tsc
    scenario: errors
    prompt: "run npx tsc --noEmit and tell me what type errors exist"
    working_dir: $FIXTURES_DIR/test-ts-errors
    expected_commands: [tsc]
    max_acceptable_tool_calls: 2
    notes: "Error-only. For small files, may add summary. Real savings on large TS projects."

  - id: npm-build-success
    name: "npm run build (success)"
    category: build
    filter: npm-build
    scenario: success
    prompt: "run npm run build and tell me if it succeeds"
    working_dir: $FIXTURES_DIR/test-node-project
    expected_commands: ["npm run build"]
    max_acceptable_tool_calls: 2
    notes: "Short-circuit to 'ok (build succeeded)'. ~80% savings."

  # ── YAML FILTERS ──────────────────────────────────────────────────────────

  - id: pip-install
    name: "pip install requests"
    category: yaml
    filter: pip
    scenario: install
    prompt: "install the requests library using pip install requests"
    working_dir: /tmp
    expected_commands: [pip]
    max_acceptable_tool_calls: 2
    notes: "Strip download progress bars; keep Collecting/Installing/Successfully. ~64% savings."

  - id: brew-already-installed
    name: "brew install (already installed)"
    category: yaml
    filter: brew
    scenario: already-installed
    prompt: "install jq using brew install jq"
    working_dir: /tmp
    expected_commands: [brew]
    max_acceptable_tool_calls: 2
    notes: "Should short-circuit to 'already installed'. ~12% savings (small input)."

  - id: make-build
    name: "make (build project)"
    category: yaml
    filter: make
    scenario: success
    prompt: "run make all in the project"
    working_dir: $FIXTURES_DIR/test-make-project
    expected_commands: [make]
    max_acceptable_tool_calls: 2
    notes: "Strip entering/leaving dir noise. Best savings on large Makefiles."

  - id: docker-build
    name: "docker build (with caching)"
    category: yaml
    filter: docker
    scenario: success
    prompt: "run docker build . and tell me if it succeeds"
    working_dir: /tmp
    expected_commands: [docker]
    max_acceptable_tool_calls: 2
    notes: "Strip CACHED/internal layers. ~60% savings on real builds."

  - id: curl-verbose
    name: "curl -v (verbose HTTP)"
    category: yaml
    filter: curl
    scenario: normal
    prompt: "run curl -v https://example.com and tell me the response status"
    working_dir: /tmp
    expected_commands: [curl]
    max_acceptable_tool_calls: 2
    notes: "Strip TLS handshake noise, keep headers and response. ~44% savings."

  # ── CONTINUATION TEST CASES ─────────────────────────────────────────────
  # These verify the model can USE compressed output to fix issues WITHOUT
  # re-running the tool. The key regression signal: if the model re-runs the
  # same command to get more detail, the compression was too aggressive.

  - id: ruff-fix-continuation
    name: "ruff check and fix all errors (continuation)"
    category: lint-continuation
    filter: ruff
    scenario: fix-after-compressed-output
    prompt: "run ruff check on /tmp/lint_issues.py and fix all the errors. do not ask for clarification."
    working_dir: $REPO_ROOT
    expected_commands: [ruff]
    max_acceptable_tool_calls: 6
    notes: |
      Compressed output (71.4% savings): 9 violations, each with file:line.
      Success criteria:
        - Model sees compressed output and goes straight to fixing (no re-run)
        - Model correctly identifies all 9 violations from compressed output
        - Model edits /tmp/lint_issues.py to fix all violations
        - Session A (with hook) uses same or fewer turns as Session B
      Violations: F401 (4x, lines 3-6), F841 (2x, lines 11-12), E712 (2x, lines 15,17), E722 (line 26)

    measured_results:
      session_a_id: e99cc1be-43d2-4059-a683-c2c0ed81598a
      session_b_id: 269fae52-65a4-4cae-91e8-147589a4e692
      input_chars: 2412
      output_chars: 691
      savings_pct: 71.4
      with_turns: 1
      without_turns: 1
      with_calls: 1
      without_calls: 1
      model_reran_cmd: false
      all_violations_identified: true
      verdict: PASS
      note: "Model identified all 9 violations (F401×4, F841×2, E712×2, E722) with file:line from compressed output. No re-run needed."

  - id: pytest-fix-continuation
    name: "pytest failures and fix all failing tests (continuation)"
    category: test-continuation
    filter: pytest
    scenario: fix-after-compressed-output
    prompt: "run pytest on /tmp/test_eval_fail.py -v and fix all the failing tests. do not ask for clarification."
    working_dir: $REPO_ROOT
    expected_commands: [pytest]
    max_acceptable_tool_calls: 6
    notes: |
      Compressed output (37.7% savings): 3 failures with full tracebacks + file:line.
      Success criteria:
        - Model sees tracebacks and goes straight to fixing (no re-run to see more detail)
        - Model correctly identifies all 3 failing tests from compressed output
        - Model fixes test_multiply_correct (:29), test_divide_basic (:33), test_add_large (:43)
        - Session A (with hook) uses same or fewer turns as Session B
      Note: 37% savings is intentionally conservative — failure details must be preserved.

    measured_results:
      session_a_id: 22f16333-76b4-494b-beee-34a4c985794f
      input_chars: 2863
      output_chars: 1785
      savings_pct: 37.7
      with_turns: 1
      without_turns: 1  # (estimated, same prompt)
      with_calls: 1
      without_calls: 1  # (estimated)
      model_reran_cmd: false
      all_failures_identified: true
      verdict: PASS
      note: "Model identified all 3 failures (test_multiply_correct:29, test_divide_basic:33, test_add_large:43) with assertion errors. Compressed tracebacks preserved full context."

  - id: clippy-fix-continuation
    name: "cargo clippy and fix all warnings (continuation)"
    category: lint-continuation
    filter: cargo-clippy
    scenario: fix-after-compressed-output
    prompt: "run cargo clippy in /tmp/test-rust-clippy and fix all the warnings. do not ask for clarification."
    working_dir: $FIXTURES_DIR/test-rust-clippy
    expected_commands: ["cargo clippy"]
    max_acceptable_tool_calls: 8
    notes: |
      Compressed output: warnings grouped by rule, each with file:line.
      Success criteria:
        - Model sees compressed clippy output with file:line for each warning
        - Model fixes all warnings without needing to re-run clippy to find locations
        - Each warning shows the specific variable/function name AND file:line

  - id: build-errors-fix-continuation
    name: "cargo build errors and fix (continuation)"
    category: build-continuation
    filter: cargo-build
    scenario: fix-after-compressed-output
    prompt: "run cargo build in /tmp/test-rust-errors and fix any compile errors. do not ask for clarification."
    working_dir: $FIXTURES_DIR/test-rust-errors
    expected_commands: ["cargo build"]
    max_acceptable_tool_calls: 8
    notes: |
      Compressed output (65% savings): error blocks with --> file:line:col preserved.
      Success criteria:
        - Model sees error[E...] blocks with file:line and fixes them directly
        - cargo build filters already preserve full error context (no fix needed)
        - This confirms build errors are already actionable from compressed output

# ── PASS/FAIL CRITERIA ─────────────────────────────────────────────────────────
# Applied by analyze_sessions.py when comparing A/B session pairs.

pass_criteria:
  # Session A (with hook) must not make significantly more tool calls than Session B
  delta_tool_calls_max: 1

  # For test runner all-pass cases: require aggressive compression
  min_compression_pct_all_pass: 80

  # For failure cases: don't require high compression (error details must be preserved)
  min_compression_pct_failure: 0

  # For lint/build cases: moderate compression
  min_compression_pct_lint: 50

  # Session A should not retry commands that Session B handled in one shot
  # If Session A makes N extra calls vs Session B, that's a regression
  max_extra_calls_vs_control: 1

