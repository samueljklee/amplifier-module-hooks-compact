match_command: "^pip\\s+(install|uninstall|upgrade)\\b"
strip_lines_matching:
  - "^\\s*Downloading\\s"              # download progress bars only
  - "^\\s*━+\\s*$"                     # standalone progress bar line (━━━━━━)
  - "^\\s*━+\\s+\\d"                   # progress bar with byte count (━━━ 62 kB)
max_lines: 60
on_empty: "pip: ok (nothing changed)"
# Note: we deliberately keep "Requirement already satisfied", "Using cached",
# "Obtaining", "Preparing metadata", and other state lines — the model needs
# to know what was already installed vs newly installed to avoid re-running
# verification commands. Crusty's rule: strip noise, not signal.
